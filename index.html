<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luqmaan & Zahrah</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body class="home-page">
    
    <!-- Decorative Image -->
    <div class="section reveal">
    <img src="and.png" class="and-image" alt="And Symbol">
    </div>

    <!-- Invitation Text -->
    <div class="section reveal">
        <p class="main-text">
            TOGETHER WITH OUR FAMILES, <br>
            WE INVITE YOU TO OUR <br> NIKAAH & WEDDING RECEPTION
        </p>
    </div>

    <div class="section reveal">
        <p class="sub-text">
            PLEASE SCROLL DOWN
        </p>
    </div>

    <!-- Buttons -->
    <div class="section reveal">

        <a href="nikaah.html">
            <img src="nikaahbutton.png" class="button-image" alt="Nikaah">
        </a>

        <br><br>

        <a href="reception.html">
            <img src="receptionbutton.png" class="button-image" alt="Reception">
        </a>

        <br><br>

        <a href="documents/invitation.pdf" download>
            <img src="downloadbutton.png" class="button-image" alt="Download Invitation">
        </a>

    </div>

    <!-- Countdown -->
    <div class="section reveal">
        <p class="accent-text">Countdown</p>
    </div>
    
    <div class="section">
    <iframe
    src="https://zaln-droid.github.io/countdown/"
    width="100%"
    height="300"
    frameborder="0">
    </iframe>
    </div>

    <!-- Message -->
    <div class="section reveal">
        <p class="main-text">
            “YOUR PRESENCE WILL MAKE OUR SPECIAL DAY EVEN MORE MEANINGFUL AS WE BEGIN THIS NEW CHAPTER TOGETHER. PLEASE REMEMBER US IN YOUR DU'AS AS WE BEGIN OUR FOREVER.”<br>
            ~ ZAHRAH & LUQMAAN.
        </p>
    </div>

    <!-- Logo -->
    <div class="section reveal">
        <img src="logo.png" class="logo-image" alt="Logo">
    </div>

<script>
const reveals = document.querySelectorAll('.reveal');

const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
        if (entry.isIntersecting) {
            entry.target.classList.add('active');
        }
    });
});

reveals.forEach((reveal) => {
    observer.observe(reveal);
});
</script>

</body>
</html>
